# lite-bfx-spark test environments
#
# Test environments (run mvn test):
#   spark-test       Pure Spark 4.x, no Databricks, no Unity Catalog    (maven:3.9-eclipse-temurin-17)
#   spark402         Apache Spark 4.0.2 runtime                          (apache/spark:4.0.2)
#   spark411         Apache Spark 4.1.1 runtime                          (apache/spark:4.1.1)
#   databricks       Databricks Runtime 17.3-LTS, no Unity Catalog       (databricksruntime/standard:17.3-LTS)
#   databricks-uc    Databricks Runtime 17.3-LTS + Unity Catalog sidecar
#   spark-uc         Pure Spark 4.x + Unity Catalog sidecar
#   serverless-build Databricks Serverless-compatible build (mvn package -Pserverless)
#   spark-shell      Interactive shell inside spark-test image
#
# Infrastructure sidecars (start automatically when needed via depends_on):
#   unity-catalog    Unity Catalog OSS REST server  (port 8080)
#   minio            S3-compatible object store      (port 9000 / console 9001)
#   azurite          Azure Blob/ADLS Gen2 emulator   (port 10000-10002)
#   fake-gcs         Google Cloud Storage emulator   (port 4443)
#
# Usage examples:
#   docker compose run --rm spark-test mvn test
#   docker compose run --rm databricks mvn test
#   docker compose run --rm spark-uc mvn test -Puc-integration
#   docker compose run --rm serverless-build mvn package -Pserverless
#   docker compose up minio azurite fake-gcs   # start cloud sidecars
#   docker compose run --rm spark-shell         # interactive shell

x-maven-opts: &maven-opts
  MAVEN_OPTS: >-
    --add-opens=java.base/java.lang=ALL-UNNAMED
    --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
    --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
    --add-opens=java.base/java.io=ALL-UNNAMED
    --add-opens=java.base/java.net=ALL-UNNAMED
    --add-opens=java.base/java.nio=ALL-UNNAMED
    --add-opens=java.base/java.util=ALL-UNNAMED
    --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
    --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED
    --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
    --add-opens=java.base/sun.nio.cs=ALL-UNNAMED
    --add-opens=java.base/sun.security.action=ALL-UNNAMED
    --add-opens=java.base/sun.util.calendar=ALL-UNNAMED
    -Xmx2g

x-test-volumes: &test-volumes
  - .:/workspace
  - maven-cache:/root/.m2

services:

  # ---------------------------------------------------------------------------
  # spark-test: pure Spark 4.x, no Databricks, no Unity Catalog
  # ---------------------------------------------------------------------------
  spark-test:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: mvn test -Pspark402

  # ---------------------------------------------------------------------------
  # python-test: pure-Python Data Source (pysam) test suite on JDK 17 + PySpark 4.0
  # ---------------------------------------------------------------------------
  python-test:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes: *test-volumes
    working_dir: /workspace/python
    command: bash -c "pip install -e . --no-deps -q && python -m pytest -q"

  # ---------------------------------------------------------------------------
  # python-test-databricks: full Python suite on the real Databricks Runtime 17.3-LTS image
  # (not the generic Dockerfile.python base) -- catches Databricks-specific environment
  # regressions the generic image can't (history: the OPENSSL_FORCE_FIPS_MODE pysam crash,
  # the /etc/pki/tls/certs CA-bundle mismatch -- see Dockerfile.python-databricks). Local
  # tests only (no cloud fixtures); see python-test-databricks-s3 for the cloud-read variant.
  # ---------------------------------------------------------------------------
  python-test-databricks:
    build:
      context: ./docker
      dockerfile: Dockerfile.python-databricks
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace/python
    command: bash -c "pip install -e . --no-deps -q && python -m pytest -q"

  # ---------------------------------------------------------------------------
  # python-test-databricks-s3: direct s3:// reads on the real Databricks Runtime image
  # against MinIO -- the regression test for the CA-bundle-path class of bug specifically
  # (a real HTTPS connection through pysam's bundled libcurl, which the generic
  # python-test-s3 image no longer exercises meaningfully now that it has the Dockerfile-
  # level symlink fix baked in; this image deliberately doesn't, to test litebfx's own
  # runtime self-healing in _cloud.py against a pristine image).
  # ---------------------------------------------------------------------------
  python-test-databricks-s3:
    build:
      context: ./docker
      dockerfile: Dockerfile.python-databricks
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace/python
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: test-bucket
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    command: bash -c "pip install -e '.[test]' -q && python -m pytest -q tests/test_cloud_s3.py -v"
    depends_on:
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # python-test-s3: direct s3:// reads (litebfx's own S3/GCS support, not the JAR's Hadoop
  # FileSystem) against MinIO -- pysam/htslib's native S3 backend, no FUSE mount.
  # ---------------------------------------------------------------------------
  python-test-s3:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes: *test-volumes
    working_dir: /workspace/python
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: test-bucket
      # AWS_ENDPOINT_URL is the only endpoint config needed: pyarrow.fs.S3FileSystem's
      # ambient resolution reads it directly, and litebfx/_cloud.py's prepare_env()/
      # effective_path() derive htslib's own HTS_S3_HOST/HTS_S3_ADDRESS_STYLE and the
      # s3+http:// URL rewrite from it automatically (confirmed empirically against MinIO --
      # plain s3:// only ever targets real AWS, regardless of HTS_S3_HOST alone). Matters for
      # real production use against any non-AWS S3-compatible store, not just this test.
      # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY cover both htslib/pyarrow.fs *and* the
      # s3_bucket test fixture's boto3 client -- boto3 reads the same standard names, no
      # separate S3_ACCESS_KEY/S3_SECRET_KEY needed.
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_ENDPOINT_URL: http://minio:9000
    command: bash -c "pip install -e '.[test]' -q && python -m pytest -q tests/test_cloud_s3.py -v"
    depends_on:
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # python-test-s3-live: same test suite as python-test-s3, against a real S3 bucket instead
  # of MinIO -- validates htslib's native S3 backend against actual AWS, not just an
  # S3-compatible emulator. Reads credentials from .env (gitignored; see .env.example and
  # TESTING.md's "Live AWS S3" section for the IAM policy). No S3_ENDPOINT/AWS_ENDPOINT_URL
  # -- real AWS needs no override, unlike MinIO.
  # ---------------------------------------------------------------------------
  python-test-s3-live:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes: *test-volumes
    working_dir: /workspace/python
    environment:
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    command: bash -c "pip install -e '.[test]' -q && python -m pytest -q tests/test_cloud_s3.py -v"

  # ---------------------------------------------------------------------------
  # python-test-databricks-s3-live: python-test-databricks-s3 uses MinIO over plain HTTP,
  # which never exercises TLS at all -- this is the one that actually proves the CA-bundle
  # self-healing fix (litebfx._cloud._fix_ca_bundle_path()) works end to end: real HTTPS,
  # through pysam's bundled libcurl, on a pristine (no Dockerfile-level symlink) Databricks
  # Runtime image. Same .env credentials as python-test-s3-live.
  # ---------------------------------------------------------------------------
  python-test-databricks-s3-live:
    build:
      context: ./docker
      dockerfile: Dockerfile.python-databricks
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace/python
    environment:
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
    command: bash -c "pip install -e '.[test]' -q && python -m pytest -q tests/test_cloud_s3.py -v"

  # ---------------------------------------------------------------------------
  # python-test-gcs: direct gs:// reads against fake-gcs-server -- pysam/htslib's native GCS
  # backend, no FUSE mount.
  # ---------------------------------------------------------------------------
  python-test-gcs:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes: *test-volumes
    working_dir: /workspace/python
    environment:
      GCS_ENDPOINT: http://fake-gcs:4443
      GCS_BUCKET: test-bucket
      # litebfx-only convention (no upstream standard exists for GCS, unlike AWS_ENDPOINT_URL)
      # -- see _cloudfs.py. Orchestration-layer only: htslib's native GCS backend has no
      # endpoint override at all, so full BAM/VCF reads over gs:// can't target this emulator.
      GCS_ENDPOINT_URL: http://fake-gcs:4443
    command: bash -c "pip install -e '.[test]' -q && python -m pytest -q tests/test_cloud_gcs.py -v"
    depends_on:
      fake-gcs:
        condition: service_started

  # ---------------------------------------------------------------------------
  # python-test-azure: direct abfss:// reads against Azurite -- download-then-open via
  # pyarrow.fs.AzureFileSystem (htslib has no native Azure backend at all), so unlike GCS
  # this covers full pysam/Spark-level reads, not just the orchestration layer.
  # ---------------------------------------------------------------------------
  python-test-azure:
    build:
      context: .
      dockerfile: docker/Dockerfile.python
    volumes: *test-volumes
    working_dir: /workspace/python
    environment:
      # litebfx-only conventions (no ambient env var covers Azure Storage account-key auth
      # or a custom endpoint the way AWS_ENDPOINT_URL does for S3) -- see _cloudfs.py.
      # Azurite's well-known dev account/key, same ones documented for spark-test-azure.
      AZURE_STORAGE_ACCOUNT: devstoreaccount1
      AZURE_STORAGE_ACCOUNT_KEY: "Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw=="
      AZURE_STORAGE_CONTAINER: test-container
      # The docker-compose service name, not the devstoreaccount1.dfs.core.windows.net alias
      # -- confirmed empirically that the alias hostname fails container creation ("Failed to
      # create a container", no clear error code) while the plain service name works, likely
      # because it already embeds "devstoreaccount1" as a subdomain-like prefix that confuses
      # Azurite's account-name parsing for this specific request type.
      AZURE_STORAGE_ENDPOINT_URL: http://azurite:80
    command: bash -c "pip install -e '.[test]' -q && python -m pytest -q tests/test_cloud_azure.py -v"
    depends_on:
      azurite:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # spark402: Apache Spark 4.0.2 runtime
  # ---------------------------------------------------------------------------
  spark402:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark402
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: mvn test -Pspark402

  # ---------------------------------------------------------------------------
  # spark411: Apache Spark 4.1.1 runtime
  # ---------------------------------------------------------------------------
  spark411:
    build:
      context: .
      dockerfile: docker/Dockerfile.spark411
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: mvn test -Pspark411

  # ---------------------------------------------------------------------------
  # databricks: Databricks Runtime 17.3-LTS, no Unity Catalog
  # ---------------------------------------------------------------------------
  databricks:
    build:
      context: ./docker
      dockerfile: Dockerfile.databricks
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: mvn test -Pspark402

  # ---------------------------------------------------------------------------
  # databricks-uc: Databricks Runtime 17.3-LTS + Unity Catalog sidecar
  # ---------------------------------------------------------------------------
  databricks-uc:
    build:
      context: ./docker
      dockerfile: Dockerfile.databricks
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment:
      <<: *maven-opts
      UNITY_CATALOG_URI: http://unity-catalog:8080
    command: mvn test -Pspark402,uc-integration
    depends_on:
      unity-catalog:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # spark-uc: Pure Spark 4.x + Unity Catalog sidecar
  # ---------------------------------------------------------------------------
  spark-uc:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment:
      <<: *maven-opts
      UNITY_CATALOG_URI: http://unity-catalog:8080
    command: mvn test -Pspark402,uc-integration
    depends_on:
      unity-catalog:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # serverless-build: produce a Databricks Serverless-compatible JAR.
  # Databricks Serverless runs on a fixed DBR with Spark 3.5.x / Java 17.
  # Activates the `serverless` Maven profile (to be defined in pom.xml) which
  # sets spark.version=3.5.x and configures bytecode target accordingly.
  # Upload the resulting JAR to a Unity Catalog Volume or workspace files:
  # https://docs.databricks.com/aws/en/jobs/how-to/use-jars-in-workflows
  # ---------------------------------------------------------------------------
  serverless-build:
    build:
      context: .
      dockerfile: Dockerfile
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: mvn package -Pserverless -DskipTests

  # ---------------------------------------------------------------------------
  # databricks-connect: Databricks Connect client for serverless smoke testing.
  # Requires real Databricks credentials passed as environment variables:
  #   DATABRICKS_HOST=https://<workspace>.azuredatabricks.net
  #   DATABRICKS_TOKEN=<personal-access-token>
  #   (or DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET for OAuth M2M)
  # ---------------------------------------------------------------------------
  databricks-connect:
    build:
      context: ./docker
      dockerfile: Dockerfile.databricks-connect
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      DATABRICKS_HOST: ${DATABRICKS_HOST:-}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_CLIENT_ID: ${DATABRICKS_CLIENT_ID:-}
      DATABRICKS_CLIENT_SECRET: ${DATABRICKS_CLIENT_SECRET:-}
    command: python3 tests/smoke_serverless.py

  # ---------------------------------------------------------------------------
  # databricks-connect-uc: same image as databricks-connect, plus litebfx[databricks]
  # installed from the local checkout (needed for the actual credential-vending call, not
  # just the Spark Connect client) -- for tests/smoke_uc_credential_vending.py, which needs a
  # real UC-governed external location and cannot run in default CI. See that script's own
  # docstring for the required env vars (UC_TEST_BAM_URL in addition to the ones below).
  # ---------------------------------------------------------------------------
  databricks-connect-uc:
    build:
      context: ./docker
      dockerfile: Dockerfile.databricks-connect
    volumes:
      - .:/workspace
    working_dir: /workspace
    environment:
      DATABRICKS_HOST: ${DATABRICKS_HOST:-}
      DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
      DATABRICKS_CLIENT_ID: ${DATABRICKS_CLIENT_ID:-}
      DATABRICKS_CLIENT_SECRET: ${DATABRICKS_CLIENT_SECRET:-}
      UC_TEST_BAM_URL: ${UC_TEST_BAM_URL:-}
    command: bash -c "pip install --no-cache-dir -e 'python[databricks]' -q && python3 tests/smoke_uc_credential_vending.py"

  # ---------------------------------------------------------------------------
  # spark-test-s3: run S3 range-access integration tests against MinIO.
  #
  # Uploads range.bam/.bai, a synthetic multi-contig FASTA, and a synthetic
  # CRAM to MinIO, then verifies that BAI/FAI/CRAI-guided reads issue HTTP
  # Range requests (fewer bytes transferred than a full-file scan).
  #
  # MinIO access logs (with Range headers) are visible via:
  #   docker compose logs minio | grep '"Range"'
  # ---------------------------------------------------------------------------
  spark-test-s3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: >-
      mvn clean test -Pspark402,s3-integration
      -Ds3.endpoint=http://minio:9000
      -Ds3.bucket=test-bucket
    depends_on:
      minio:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # spark-test-gcs: run GCS range-access integration tests against fake-gcs-server
  #
  # Uploads fixtures directly via fake-gcs REST API (no GCS client library needed).
  # Tests assert that FAI/BAI/tabix-guided reads transfer fewer bytes than full scans.
  # ---------------------------------------------------------------------------
  spark-test-gcs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: >-
      mvn clean test -Pspark402,gcs-integration
      -Dgcs.endpoint=http://fake-gcs:4443
      -Dgcs.bucket=test-bucket
    depends_on:
      fake-gcs:
        condition: service_started

  # ---------------------------------------------------------------------------
  # spark-test-azure: run Azure range-access integration tests against Azurite
  #
  # Azurite exposes network aliases (devstoreaccount1.dfs.core.windows.net and
  # devstoreaccount1.blob.core.windows.net) so the ABFS connector can resolve
  # the storage account DNS name without /etc/hosts changes.
  # ---------------------------------------------------------------------------
  spark-test-azure:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SAMTOOLS_VERSION: "1.21"
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    command: >-
      mvn clean test -Pspark402,azure-integration
    depends_on:
      azurite:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # spark-shell: interactive shell for ad-hoc debugging
  # ---------------------------------------------------------------------------
  spark-shell:
    build:
      context: .
      dockerfile: Dockerfile
    volumes: *test-volumes
    working_dir: /workspace
    environment: *maven-opts
    entrypoint: /bin/bash
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # unity-catalog: Unity Catalog OSS REST server
  # ---------------------------------------------------------------------------
  unity-catalog:
    image: unitycatalog/unitycatalog:latest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/2.1/unity-catalog/catalogs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # minio: S3-compatible storage (s3a:// connector testing)
  # Access key: minioadmin  Secret key: minioadmin
  # S3 API: http://localhost:9000   Console: http://localhost:9001
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001" --json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # azurite: Azure Blob / ADLS Gen2 emulator (abfss:// connector testing)
  # Connection string: DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;
  #   AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;
  #   BlobEndpoint=http://localhost:10000/devstoreaccount1;
  # ---------------------------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:80"    # Blob — container listens on port 80 so ABFS connector (HTTP default) can reach it
      - "10001:10001" # Queue
      - "10002:10002" # Table
    # Blob port 80: the ABFS connector uses port 80 for HTTP by default (no configurable override).
    # Within the Docker network, containers reach azurite at devstoreaccount1.dfs.core.windows.net:80.
    # The host port mapping (10000:80) preserves backward compatibility for external tools.
    # --skipApiVersionCheck: pyarrow's bundled Azure SDK (used by the Python package's
    # AzureFileSystem orchestration) sends a newer Storage REST API version than this pinned
    # `latest` Azurite build recognizes ("API version ... is not supported by Azurite",
    # confirmed empirically) -- this is Azurite's own documented escape hatch for a
    # newer-client-than-emulator mismatch, permissive only (skips a version header check, no
    # behavior change), safe for the Java side's older SDK too.
    command: azurite --blobHost 0.0.0.0 --blobPort 80 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --skipApiVersionCheck
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "80"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        aliases:
          - devstoreaccount1.dfs.core.windows.net
          - devstoreaccount1.blob.core.windows.net

  # ---------------------------------------------------------------------------
  # fake-gcs: Google Cloud Storage emulator (gs:// connector testing)
  # Endpoint: http://localhost:4443
  # ---------------------------------------------------------------------------
  fake-gcs:
    image: fsouza/fake-gcs-server:latest
    ports:
      - "4443:4443"
    command: -scheme http -port 4443

volumes:
  maven-cache:
