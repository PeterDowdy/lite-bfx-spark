name: Publish

# Triggered by pushing a version tag, e.g.:
#   git tag v1.0.0 && git push origin v1.0.0
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   OSSRH_USERNAME    — Sonatype Central Portal username (token username)
#   OSSRH_TOKEN       — Sonatype Central Portal token (token password)
#   GPG_PRIVATE_KEY   — ASCII-armored GPG private key
#                       (gpg --armor --export-secret-keys <key-id>)
#   GPG_PASSPHRASE    — Passphrase for the GPG key
#
# The workflow publishes two artifacts to Maven Central:
#   com.litebfx:lite-bfx-spark              (Java core fat JAR)
#   com.litebfx:lite-bfx-spark-scala_2.13  (Scala fat JAR, includes core)
#
# Each artifact is accompanied by a sources JAR, a javadoc JAR, and GPG
# signatures on all four files — the minimum required by Maven Central.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # e.g. v1.0.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # e.g. v1.0.0-rc1

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-progress publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Set MAVEN_OPTS
        run: |
          echo "MAVEN_OPTS=\
            --add-opens=java.base/java.lang=ALL-UNNAMED \
            --add-opens=java.base/java.lang.invoke=ALL-UNNAMED \
            --add-opens=java.base/java.lang.reflect=ALL-UNNAMED \
            --add-opens=java.base/java.io=ALL-UNNAMED \
            --add-opens=java.base/java.net=ALL-UNNAMED \
            --add-opens=java.base/java.nio=ALL-UNNAMED \
            --add-opens=java.base/java.util=ALL-UNNAMED \
            --add-opens=java.base/java.util.concurrent=ALL-UNNAMED \
            --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED \
            --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
            --add-opens=java.base/sun.nio.cs=ALL-UNNAMED \
            --add-opens=java.base/sun.security.action=ALL-UNNAMED \
            --add-opens=java.base/sun.util.calendar=ALL-UNNAMED \
            -Xmx2g" >> "$GITHUB_ENV"

      # Strip the leading 'v' from the tag name (v1.0.0 → 1.0.0) and set the
      # Maven project version to match.  This avoids committing version bumps
      # to pom.xml — the tag is the single source of truth for the version.
      - name: Set release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          mvn --batch-mode versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      # Import the GPG key so maven-gpg-plugin can sign artifacts.
      # The key is stored as a repository secret and piped into gpg --import.
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          # Trust the key fully so gpg doesn't prompt during signing
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5}' | head -1)
          echo "$GPG_KEY_ID:6:" | gpg --import-ownertrust

      # Write a Maven settings.xml that supplies the Sonatype Central Portal
      # credentials under the server id "central" (referenced by the
      # central-publishing-maven-plugin in the release profile).
      - name: Configure Maven settings
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/settings.xml" <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <servers>
              <server>
                <id>central</id>
                <username>${env.OSSRH_USERNAME}</username>
                <password>${env.OSSRH_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}

      # Full lifecycle: compile → test → package → sign → upload to Central.
      # -Prelease activates: source JAR, javadoc JAR, GPG signing, and the
      # central-publishing-maven-plugin deploy extension.
      # Tests run here as a final gate; they passed in CI but rerunning on the
      # exact release commit catches any last-minute regressions.
      - name: Build, sign, and publish
        run: |
          mvn --batch-mode deploy \
            -Prelease \
            -Pspark402 \
            -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}"
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "lite-bfx-spark ${{ env.RELEASE_VERSION }}"
          generate_release_notes: true
          files: |
            core/target/lite-bfx-spark-${{ env.RELEASE_VERSION }}.jar
            scala/target/lite-bfx-spark-scala_2.13-${{ env.RELEASE_VERSION }}.jar
